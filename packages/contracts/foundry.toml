[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
saigon = "${SAIGON_RPC_URL}"
ronin  = "${RONIN_MAINNET_RPC_URL}"

[etherscan]
# Sky Mavis usa explorer propio (https://saigon-app.roninchain.com).
# Verificación: forge verify-contract ... --verifier sourcify
